{% extends "base.html" %}
{% block title %}Betting Calculator - HKVelocity{% endblock %}

{% block content %}
<style>
    .calculator-page {
        padding: 14px;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        overflow: auto;
    }

    .calc-header {
        text-align: center;
        margin-bottom: 18px;
        padding-top: 6px;
    }

    .calc-header h1 {
        font-size: 2.0em;
        color: #ffd700;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin: 0;
    }

    .calc-main-layout {
        display: grid;
        grid-template-columns: 1.05fr 1.55fr;
        gap: 14px;
        width: 100%;
        max-width: none;
        margin: 0;
        box-sizing: border-box;
        align-items: start;
    }

    .calc-input-panel,
    .calc-results-panel {
        width: 100%;
        box-sizing: border-box;
    }

    .calc-input-panel {
        padding: 14px;
        background: rgba(30, 30, 50, 0.92);
        border: 2px solid #ffd700;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        min-height: 720px;
    }

    .combo-races-container,
    .race-input-group,
    .calc-input-group {
        width: 100%;
        box-sizing: border-box;
    }

    .combo-races-container {
        flex: 1;
        overflow-y: auto;
        max-height: calc(100vh - 260px);
    }

    .panel-section {
        margin-bottom: 20px;
    }

    .panel-section h2 {
        font-size: 1.3em;
        color: #ffd700;
        margin: 0 0 12px 0;
        border-bottom: 2px solid #ffd700;
        padding-bottom: 8px;
    }

    .calc-input-group {
        margin-bottom: 12px;
    }

    .calc-input-group label {
        display: block;
        font-size: 1.05em;
        color: #e0e0e0;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .calc-input-group input {
        width: 100%;
        padding: 11px 12px;
        font-size: 1.0em;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #ffd700;
        border-radius: 6px;
        color: #fff;
        box-sizing: border-box;
    }

    .race-input-group {
        background: rgba(255, 215, 0, 0.05);
        border-left: 3px solid #ffd700;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 4px;
    }

    .race-input-group label {
        font-size: 1.05em;
        color: #ffd700;
        margin-bottom: 8px;
        display: block;
        font-weight: 600;
    }

    .race-odds-inputs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .race-odds-inputs input {
        font-size: 1.0em;
        padding: 10px;
    }

    .calc-btn-row {
        display: flex;
        gap: 10px;
        margin-top: auto;
    }

    .calc-btn {
        padding: 14px;
        font-size: 1.15em;
        background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
        color: #000;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        flex: 1;
    }

    .calc-btn.secondary {
        background: linear-gradient(135deg, #4a4a6a 0%, #6a6a8a 100%);
        color: #fff;
    }

    .calc-results-panel {
        background: rgba(30, 30, 50, 0.92);
        border: 2px solid #ffd700;
        border-radius: 12px;
        padding: 18px;
        min-height: 720px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        overflow-y: auto;
        max-height: calc(100vh - 120px);
    }

    .results-table-wrapper {
        margin-bottom: 24px;
    }

    .results-table-wrapper h3 {
        font-size: 1.3em;
        color: #ffd700;
        margin: 16px 0 10px 0;
        border-bottom: 2px solid #ffd700;
        padding-bottom: 7px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 14px;
        font-size: 0.92em;
    }

    table th {
        background: rgba(255, 215, 0, 0.15);
        color: #ffd700;
        padding: 12px 10px;
        text-align: left;
        font-weight: bold;
        border-bottom: 2px solid #ffd700;
        border-right: 1px solid #ffd700;
        white-space: nowrap;
    }

    table td {
        padding: 10px 10px;
        color: #e0e0e0;
        border-bottom: 1px solid #333;
        border-right: 1px solid #333;
        white-space: nowrap;
    }

    .combo-number {
        font-weight: bold;
        color: #ffd700;
        text-align: center;
    }

    .amount-cell {
        text-align: right;
        font-family: 'Courier New', monospace;
    }

    .combo-profit.positive {
        color: #3ddc97;
        font-weight: bold;
    }

    .combo-profit.negative {
        color: #ff6b6b;
        font-weight: bold;
    }

    .combo-profit.neutral {
        color: #999;
        font-weight: bold;
    }

    @media (max-width: 1400px) {
        .calc-main-layout {
            grid-template-columns: 1fr;
        }

        .calc-input-panel,
        .calc-results-panel {
            min-height: auto;
        }
    }

    @media (max-width: 768px) {
        .race-odds-inputs {
            grid-template-columns: 1fr;
        }

        .calc-btn-row {
            flex-direction: column;
        }
    }
</style>

<div class="calculator-page">
    <div class="calc-header">
        <h1>🧮 投注組合計算器</h1>
    </div>

    <div class="calc-main-layout">
        <div class="calc-input-panel">
            <div class="panel-section">
                <h2>投注設定</h2>
                <div class="calc-input-group">
                    <label for="bet-amount-combo">單位投注 (HKD)</label>
                    <input type="number" id="bet-amount-combo" min="1" step="1" value="100">
                </div>
                <div class="calc-btn-row">
                    <button class="calc-btn secondary" onclick="fillDefaultOdds()">🔢 自動填賠率 (預設=2)</button>
                    <button class="calc-btn secondary" onclick="clearOdds()">🧹 清除賠率</button>
                </div>
            </div>

            <div class="panel-section">
                <h2>各關賠率</h2>
                <div class="combo-races-container" id="combo-races-container"></div>
            </div>

            <div class="calc-btn-row">
                <button class="calc-btn" onclick="calculateCombination()">🧮 計算組合</button>
            </div>
        </div>

        <div class="calc-results-panel" id="calc-results-panel" style="display:none;">
            <div class="results-table-wrapper">
                <h3>🎯 投注方式</h3>
                <table>
                    <thead>
                        <tr>
                            <th>過關形式</th>
                            <th>注數</th>
                            <th>投注總額</th>
                            <th>實得派彩</th>
                            <th>淨贏</th>
                            <th>賠率</th>
                            <th>最高派彩</th>
                        </tr>
                    </thead>
                    <tbody id="advance-results-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let globalOddData = [];
    let globalGeneral = {};
    let globalAdvanceData = [];

    const TOTAL_RACES = 6;

    const HKJC_ALLUP_ORDER = {
        2: [1, 3],
        3: [1, 3, 4, 6, 7],
        4: [1, 4, 5, 6, 10, 11, 14, 15],
        5: [1, 5, 6, 10, 15, 16, 20, 25, 26, 30, 31],
        6: [1, 6, 7, 15, 20, 21, 22, 35, 41, 42, 50, 56, 57, 62, 63]
    };

    const allUpLegMap = {
        2: {
            1: { singles: 0, doubles: 1 },
            3: { singles: 2, doubles: 1 }
        },
        3: {
            1: { singles: 0, doubles: 0, trebles: 1 },
            3: { singles: 2, doubles: 1, trebles: 0 },
            4: { singles: 1, doubles: 1, trebles: 1 },
            6: { singles: 0, doubles: 3, trebles: 0 },
            7: { singles: 1, doubles: 3, trebles: 1 }
        },
        4: {
            1: { singles: 0, doubles: 0, trebles: 0, fours: 1 },
            4: { singles: 3, doubles: 0, trebles: 0, fours: 0 },
            5: { singles: 2, doubles: 1, trebles: 0, fours: 0 },
            6: { singles: 0, doubles: 2, trebles: 0, fours: 0 },
            10: { singles: 0, doubles: 1, trebles: 1, fours: 0 },
            11: { singles: 2, doubles: 1, trebles: 1, fours: 0 },
            14: { singles: 0, doubles: 2, trebles: 1, fours: 0 },
            15: { singles: 1, doubles: 2, trebles: 1, fours: 1 }
        },
        5: {
            1: { singles: 0, doubles: 0, trebles: 0, fours: 0, fives: 1 },
            5: { singles: 4, doubles: 0, trebles: 0, fours: 0, fives: 0 },
            6: { singles: 3, doubles: 1, trebles: 0, fours: 0, fives: 0 },
            10: { singles: 0, doubles: 0, trebles: 0, fours: 1, fives: 0 },
            15: { singles: 3, doubles: 1, trebles: 1, fours: 0, fives: 0 },
            16: { singles: 2, doubles: 0, trebles: 1, fours: 1, fives: 0 },
            20: { singles: 0, doubles: 2, trebles: 1, fours: 0, fives: 0 },
            25: { singles: 2, doubles: 1, trebles: 1, fours: 1, fives: 0 },
            26: { singles: 1, doubles: 2, trebles: 1, fours: 1, fives: 0 },
            30: { singles: 1, doubles: 0, trebles: 1, fours: 1, fives: 1 },
            31: { singles: 1, doubles: 1, trebles: 1, fours: 1, fives: 1 }
        },
        6: {
            1: { singles: 0, doubles: 0, trebles: 0, fours: 0, fives: 0, sixes: 1 },
            6: { singles: 5, doubles: 0, trebles: 0, fours: 0, fives: 0, sixes: 0 },
            7: { singles: 4, doubles: 1, trebles: 0, fours: 0, fives: 0, sixes: 0 },
            15: { singles: 0, doubles: 0, trebles: 0, fours: 0, fives: 1, sixes: 0 },
            20: { singles: 0, doubles: 0, trebles: 1, fours: 0, fives: 0, sixes: 0 },
            21: { singles: 4, doubles: 0, trebles: 1, fours: 0, fives: 0, sixes: 0 },
            22: { singles: 3, doubles: 1, trebles: 0, fours: 0, fives: 0, sixes: 0 },
            35: { singles: 1, doubles: 1, trebles: 1, fours: 0, fives: 0, sixes: 0 },
            41: { singles: 3, doubles: 1, trebles: 1, fours: 0, fives: 0, sixes: 0 },
            42: { singles: 0, doubles: 0, trebles: 1, fours: 1, fives: 0, sixes: 0 },
            50: { singles: 0, doubles: 1, trebles: 1, fours: 1, fives: 0, sixes: 0 },
            56: { singles: 2, doubles: 1, trebles: 1, fours: 1, fives: 0, sixes: 0 },
            57: { singles: 1, doubles: 2, trebles: 1, fours: 1, fives: 0, sixes: 0 },
            62: { singles: 1, doubles: 1, trebles: 1, fours: 1, fives: 1, sixes: 0 },
            63: { singles: 1, doubles: 1, trebles: 1, fours: 1, fives: 1, sixes: 1 }
        }
    };

    function initRaces() {
        const c = document.getElementById('combo-races-container');
        c.innerHTML = '';
        for (let i = 1; i <= TOTAL_RACES; i++) {
            c.innerHTML += `
            <div class="race-input-group">
                <label>第 ${i} 場</label>
                <div class="race-odds-inputs">
                    <input type="number" class="race-odds" placeholder="贏" step="0.01" min="0.01" data-race="${i}" data-result="win">
                    <input type="number" class="race-odds" placeholder="輸" step="0.01" min="0" data-race="${i}" data-result="loss">
                </div>
            </div>`;
        }
    }

    function fillDefaultOdds() {
        document.querySelectorAll('[data-result="win"]').forEach(input => input.value = '2.00');
    }

    function clearOdds() {
        document.querySelectorAll('.race-odds').forEach(input => input.value = '');
    }

    function setOddData() {
        const a = [];
        for (let i = 1; i <= TOTAL_RACES; i++) {
            const w = document.querySelector(`[data-race="${i}"][data-result="win"]`);
            const l = document.querySelector(`[data-race="${i}"][data-result="loss"]`);
            a.push({
                odd: parseFloat(w.value) || 0,
                maxodd: parseFloat(w.value) || 0,
                lossOdds: parseFloat(l.value) || 0
            });
        }
        return a;
    }

    function setGeneralData() {
        const betAmount = parseFloat(document.getElementById('bet-amount-combo').value);
        let selectedCount = 0;
        for (let i = 1; i <= TOTAL_RACES; i++) {
            const w = document.querySelector(`[data-race="${i}"][data-result="win"]`);
            if ((parseFloat(w.value) || 0) > 0) selectedCount++;
        }
        return { totalMatch: selectedCount, selectedCount, betAmount };
    }

    function formatNumber(v) {
        return Math.round(v * 100) / 100;
    }

    function showAmount(v) {
        return formatNumber(v).toFixed(2);
    }

    function generateCombinations(arr, k) {
        const res = [];
        function bt(start, cur) {
            if (cur.length === k) {
                res.push([...cur]);
                return;
            }
            for (let i = start; i < arr.length; i++) {
                cur.push(arr[i]);
                bt(i + 1, cur);
                cur.pop();
            }
        }
        if (k === 0) return [[]];
        if (k > arr.length) return [];
        bt(0, []);
        return res;
    }

    function getOdd(raceIndex) {
        const row = globalOddData[raceIndex - 1];
        return row ? (parseFloat(row.odd) || 0) : 0;
    }

    function getSelectedRaces() {
        const arr = [];
        for (let i = 1; i <= TOTAL_RACES; i++) {
            if (getOdd(i) > 0) arr.push(i);
        }
        return arr;
    }

    function sumOddsForCombo(combo) {
        return combo.reduce((p, idx) => p * getOdd(idx), 1);
    }

    function buildAdvanceData(general) {
        const n = general.totalMatch;
        if (n !== 2) return [];

        const rows = [];
        const selectedRaces = getSelectedRaces();

        if (selectedRaces.length !== 2) return [];

        function payoutForCombo(combo) {
            return combo.reduce((p, idx) => p * getOdd(idx), 1) * general.betAmount;
        }

        const single1 = getOdd(selectedRaces[0]) * general.betAmount;
        const single2 = getOdd(selectedRaces[1]) * general.betAmount;
        const doublePayout = payoutForCombo([selectedRaces[0], selectedRaces[1]]);

        const data = [
            {
                comboName: '2 x 1',
                betCount: 1,
                totalPay: 1 * general.betAmount,
                winAmount: doublePayout
            },
            {
                comboName: '2 x 3',
                betCount: 3,
                totalPay: 3 * general.betAmount,
                winAmount: (single1 + single2) + doublePayout
            }
        ];

        data.forEach(item => {
            const netWin = item.winAmount - item.totalPay;
            const oddsValue = item.totalPay > 0 ? (item.winAmount / item.totalPay) : 0;

            rows.push({
                comboName: item.comboName,
                betCount: item.betCount,
                totalPay: formatNumber(item.totalPay),
                winAmount: formatNumber(item.winAmount),
                winMaxAmount: formatNumber(item.winAmount),
                netWin: formatNumber(netWin),
                odds: formatNumber(oddsValue)
            });
        });

        return rows;
    }

    function calculateCombination() {
        const betAmount = parseFloat(document.getElementById('bet-amount-combo').value);
        if (isNaN(betAmount) || betAmount <= 0) {
            alert('請輸入有效的投注金額');
            return;
        }

        globalOddData = setOddData();
        globalGeneral = setGeneralData();

        if (globalGeneral.selectedCount < 2) {
            alert('請至少輸入 2 場賠率（至少 2 關）');
            return;
        }
        if (globalGeneral.selectedCount > 6) {
            alert('最多只支援 6 場賠率');
            return;
        }

        globalAdvanceData = buildAdvanceData(globalGeneral);
        displayResults();
    }

    function displayResults() {
        const advanceData = globalAdvanceData;
        const advanceTbody = document.getElementById('advance-results-tbody');
        advanceTbody.innerHTML = '';

        if (advanceData.length === 0) {
            advanceTbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">沒有有效結果（請輸入 2–6 場賠率）</td></tr>';
            document.getElementById('calc-results-panel').style.display = 'block';
            return;
        }

        advanceData.forEach(item => {
            const profitClass = item.netWin > 0 ? 'positive' : item.netWin < 0 ? 'negative' : 'neutral';
            advanceTbody.innerHTML += `
            <tr>
                <td class="combo-number">${item.comboName}</td>
                <td class="amount-cell">${item.betCount}</td>
                <td class="amount-cell">${showAmount(item.totalPay)}</td>
                <td class="amount-cell">${showAmount(item.winAmount)}</td>
                <td class="amount-cell combo-profit ${profitClass}">${showAmount(item.netWin)}</td>
                <td class="amount-cell">${item.odds.toFixed(2)}</td>
                <td class="amount-cell">${showAmount(item.winMaxAmount)}</td>
            </tr>
        `;
        });

        document.getElementById('calc-results-panel').style.display = 'block';
    }

    initRaces();
</script>
{% endblock %}
